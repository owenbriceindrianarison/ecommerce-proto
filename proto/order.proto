syntax = "proto3";

package ecommerce.order.v1;

import "common.proto";

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (Order);
  rpc GetOrder    (GetOrderRequest)    returns (Order);
  rpc ListOrders  (ListOrdersRequest)  returns (ListOrdersResponse);
  rpc CancelOrder (CancelOrderRequest) returns (Order);

  // Server streaming — iOS et Next.js consomment le même flux pour le suivi live
  rpc WatchOrder  (WatchOrderRequest)  returns (stream OrderStatusUpdate);
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING     = 1;
  ORDER_STATUS_CONFIRMED   = 2;
  ORDER_STATUS_PROCESSING  = 3;
  ORDER_STATUS_SHIPPED     = 4;
  ORDER_STATUS_DELIVERED   = 5;
  ORDER_STATUS_CANCELLED   = 6;
  ORDER_STATUS_REFUNDED    = 7;
}

message ShippingAddress {
  string          street      = 1;
  string          city        = 2;
  string          postal_code = 3;
  string          country     = 4;
  optional string phone       = 5;
}

message OrderItem {
  ecommerce.common.v1.Uuid  id           = 1;
  ecommerce.common.v1.Uuid  product_id   = 2;
  string                     product_name = 3;
  int32                      quantity     = 4;
  ecommerce.common.v1.Money  unit_price   = 5;
  ecommerce.common.v1.Money  total        = 6;
}

message Order {
  ecommerce.common.v1.Uuid       id               = 1;
  ecommerce.common.v1.Uuid       user_id          = 2;
  OrderStatus                     status           = 3;
  ecommerce.common.v1.Money       total            = 4;
  optional ShippingAddress        shipping_address = 5;
  optional string                 notes            = 6;
  repeated OrderItem              items            = 7;
  ecommerce.common.v1.Timestamp   created_at       = 8;
}

message CreateOrderRequestItem {
  ecommerce.common.v1.Uuid product_id = 1;
  int32                    quantity   = 2;
}

message CreateOrderRequest {
  repeated CreateOrderRequestItem items            = 1;
  ShippingAddress                  shipping_address = 2;
  optional string                  notes            = 3;
}

message GetOrderRequest    { ecommerce.common.v1.Uuid order_id = 1; }
message CancelOrderRequest { ecommerce.common.v1.Uuid order_id = 1; }
message WatchOrderRequest  { ecommerce.common.v1.Uuid order_id = 1; }

message OrderStatusUpdate {
  ecommerce.common.v1.Uuid       order_id   = 1;
  OrderStatus                     status     = 2;
  ecommerce.common.v1.Timestamp   updated_at = 3;
}

message ListOrdersRequest {
  ecommerce.common.v1.PageRequest page = 1;
}

message ListOrdersResponse {
  repeated Order               orders    = 1;
  ecommerce.common.v1.PageInfo page_info = 2;
}