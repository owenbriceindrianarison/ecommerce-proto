syntax = "proto3";

package cart.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

// === Messages ===

message Cart {
  string id = 1;
  string user_id = 2;
  repeated CartItem items = 3;
  common.v1.Money total = 4;
  google.protobuf.Timestamp expires_at = 5; // panier expire après X minutes
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CartItem {
  string variant_id = 1;
  string product_id = 2;
  string product_name = 3; // dénormalisé pour l'affichage
  string variant_name = 4;
  int32 quantity = 5;
  common.v1.Money unit_price = 6;
  common.v1.Money subtotal = 7;
}

message AddItemRequest {
  string variant_id = 1;
  int32 quantity = 2;
}

message RemoveItemRequest {
  string variant_id = 1;
}

message UpdateItemQuantityRequest {
  string variant_id = 1;
  int32 quantity = 2; // nouvelle quantité absolue (pas un delta)
}

message GetCartRequest {} // user ID depuis le JWT

message ClearCartRequest {}

// --- Sync multi-device ---
message WatchCartRequest {} // user ID depuis le JWT

// === Service ===

service CartService {
  rpc GetCart(GetCartRequest) returns (Cart);
  rpc AddItem(AddItemRequest) returns (Cart);
  rpc RemoveItem(RemoveItemRequest) returns (Cart);
  rpc UpdateItemQuantity(UpdateItemQuantityRequest) returns (Cart);
  rpc ClearCart(ClearCartRequest) returns (Cart);

  // Server-streaming : sync panier entre devices du même utilisateur
  rpc WatchCart(WatchCartRequest) returns (stream Cart);
}
