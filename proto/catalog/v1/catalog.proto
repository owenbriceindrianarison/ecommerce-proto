syntax = "proto3";

package catalog.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

// === Messages ===

message Category {
  string id = 1;
  string name = 2;
  string slug = 3; // URL-friendly : "t-shirts-homme"
  string parent_id = 4; // vide si racine, permet l'arborescence
  int32 position = 5; // ordre d'affichage
}

message Product {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string category_id = 5;
  repeated ProductVariant variants = 6;
  repeated ProductImage images = 7;
  ProductStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_DRAFT = 1;
  PRODUCT_STATUS_ACTIVE = 2;
  PRODUCT_STATUS_ARCHIVED = 3;
}

// Une variante = une combinaison SKU unique (ex: "T-shirt bleu taille M").
message ProductVariant {
  string id = 1;
  string sku = 2; // Stock Keeping Unit, unique
  string name = 3; // "Bleu / M"
  common.v1.Money price = 4;
  map<string, string> attributes = 5; // {"color": "blue", "size": "M"}
}

message ProductImage {
  string id = 1;
  string url = 2; // URL signée S3/MinIO (temporaire)
  int32 position = 3; // ordre d'affichage
  bool is_primary = 4;
}

// --- CRUD Produits ---
message CreateProductRequest {
  string name = 1;
  string description = 2;
  string category_id = 3;
  repeated CreateVariantInput variants = 4;
}

message CreateVariantInput {
  string sku = 1;
  string name = 2;
  common.v1.Money price = 3;
  map<string, string> attributes = 4;
}

message GetProductRequest {
  string product_id = 1;
}

message ListProductsRequest {
  string category_id = 1; // filtre optionnel
  common.v1.PaginationRequest pagination = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  common.v1.PaginationResponse pagination = 2;
}

// --- Recherche full-text ---
message SearchProductsRequest {
  string query = 1; // texte libre, utilisera tsvector PG
  string category_id = 2; // filtre optionnel
  common.v1.PaginationRequest pagination = 3;
}

message SearchProductsResponse {
  repeated Product products = 1;
  common.v1.PaginationResponse pagination = 2;
}

// --- Upload image ---
// L'upload se fait en 2 étapes :
// 1. Le client demande une URL signée PUT via GenerateUploadUrl
// 2. Le client uploade directement vers S3/MinIO
// 3. Le client confirme via ConfirmImageUpload
message GenerateUploadUrlRequest {
  string product_id = 1;
  string content_type = 2; // "image/jpeg", "image/png"
}

message GenerateUploadUrlResponse {
  string upload_url = 1; // URL signée PUT (expire en 15 min)
  string image_id = 2; // ID de l'image à confirmer après upload
}

message ConfirmImageUploadRequest {
  string product_id = 1;
  string image_id = 2;
  int32 position = 3;
  bool is_primary = 4;
}

// --- Catégories ---
message CreateCategoryRequest {
  string name = 1;
  string parent_id = 2;
  int32 position = 3;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated Category categories = 1; // arbre à plat, le client reconstruit
}

// === Service ===

service CatalogService {
  // Produits
  rpc CreateProduct(CreateProductRequest) returns (Product);
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);

  // Images
  rpc GenerateUploadUrl(GenerateUploadUrlRequest) returns (GenerateUploadUrlResponse);
  rpc ConfirmImageUpload(ConfirmImageUploadRequest) returns (Product);

  // Catégories
  rpc CreateCategory(CreateCategoryRequest) returns (Category);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
}
